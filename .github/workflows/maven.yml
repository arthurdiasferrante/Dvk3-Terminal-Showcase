# Single CI workflow: runs unit tests once, then packages the JAR (no duplicate test run).
# Previously we had a separate test.yml that also ran `mvn test` — redundant with `package`/`verify`.

name: Java CI with Maven

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      # `verify` runs the full lifecycle up to and including tests, then package — tests execute once here.
      - name: Test and package
        run: mvn -B -ntp verify --file pom.xml
